<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motif - Variant C: Glassmorphism Dark</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-page: #0F0F14;
    --bg-sidebar: rgba(18, 18, 26, 0.85);
    --bg-card: rgba(255, 255, 255, 0.04);
    --bg-card-hover: rgba(255, 255, 255, 0.07);
    --bg-card-solid: #1A1A24;
    --bg-input: rgba(255, 255, 255, 0.06);
    --bg-active: rgba(255, 255, 255, 0.08);

    --text-primary: #EEEDF2;
    --text-secondary: #9896A6;
    --text-muted: #5E5C6E;
    --text-inverse: #0F0F14;

    --accent: #A78BFA;
    --accent-hover: #8B6FE0;
    --accent-bg: rgba(167, 139, 250, 0.1);
    --accent-border: rgba(167, 139, 250, 0.2);
    --accent-glow: rgba(167, 139, 250, 0.15);

    --border: rgba(255, 255, 255, 0.08);
    --border-light: rgba(255, 255, 255, 0.05);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);

    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 18px;
    --radius-xl: 24px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    display: flex;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle ambient gradient */
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    right: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(167,139,250,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(250,139,200,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 220px;
    background: var(--bg-sidebar);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    z-index: 1;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    padding: 20px 20px 16px;
    gap: 12px;
  }

  .sidebar-logo .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #C084FC);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(167,139,250,0.3);
  }

  .sidebar-logo .logo-text {
    font-weight: 700;
    font-size: 18px;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  .sidebar-nav {
    flex: 1;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s ease;
    cursor: pointer;
  }

  .nav-item:hover {
    background: var(--bg-active);
    color: var(--text-primary);
  }

  .nav-item.active {
    background: var(--accent-bg);
    color: var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent-border);
  }

  .nav-item svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .nav-badge {
    margin-left: auto;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
  }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #6ECF6E;
    box-shadow: 0 0 6px rgba(110,207,110,0.4);
  }

  .status-text {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ===== Main Content ===== */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    z-index: 1;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .page-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .page-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ===== Filter Bar ===== */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
    backdrop-filter: blur(8px);
  }

  .filter-chip:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent-border);
    color: var(--text-primary);
  }

  .filter-chip.active {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .filter-chip svg { width: 14px; height: 14px; }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    margin-left: auto;
    min-width: 200px;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }

  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg), 0 0 16px var(--accent-glow);
  }

  .search-box input {
    border: none;
    outline: none;
    background: none;
    font-size: 13px;
    color: var(--text-primary);
    width: 100%;
    font-family: inherit;
  }

  .search-box input::placeholder { color: var(--text-muted); }
  .search-box svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }

  /* ===== Person Cards Grid ===== */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }

  .person-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: all 0.25s ease;
    cursor: pointer;
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }

  .person-card:hover {
    background: var(--bg-card-hover);
    transform: translateY(-3px);
    border-color: var(--accent-border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px var(--accent-border);
  }

  .person-card .cover {
    aspect-ratio: 1;
    position: relative;
    overflow: hidden;
  }

  .person-card .cover .cover-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(transparent, rgba(0,0,0,0.5));
  }

  .person-card .info {
    padding: 14px 16px;
  }

  .person-card .name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .person-card .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .person-card .count {
    font-size: 12px;
    color: var(--text-muted);
  }

  .rating-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    background: rgba(250, 204, 21, 0.1);
    border: 1px solid rgba(250, 204, 21, 0.15);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: #FACC15;
  }

  .rating-badge svg {
    width: 12px;
    height: 12px;
    fill: currentColor;
  }

  /* ===== Button ===== */
  .btn-primary {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    box-shadow: 0 2px 8px rgba(167,139,250,0.25);
  }

  .btn-primary:hover {
    background: var(--accent-hover);
    box-shadow: 0 4px 16px rgba(167,139,250,0.35);
  }

  .btn-primary svg { width: 16px; height: 16px; }

  .section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 36px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Scrollbar */
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .style-banner {
    position: fixed;
    top: 16px;
    right: 16px;
    background: linear-gradient(135deg, var(--accent), #C084FC);
    color: white;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(167,139,250,0.3);
  }

  /* placeholder images */
  .img-placeholder-1 { background: linear-gradient(135deg, #6B4C8A, #4A3068); }
  .img-placeholder-2 { background: linear-gradient(135deg, #3A5A7A, #284868); }
  .img-placeholder-3 { background: linear-gradient(135deg, #5A4A6A, #483858); }
  .img-placeholder-4 { background: linear-gradient(135deg, #3A6A5A, #285848); }
  .img-placeholder-5 { background: linear-gradient(135deg, #6A3A5A, #582848); }
  .img-placeholder-6 { background: linear-gradient(135deg, #5A5A3A, #484828); }
</style>
</head>
